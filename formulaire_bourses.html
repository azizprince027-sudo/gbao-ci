<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gbao-ci</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./formulaire_bourses.css">
</head>
<body>

    <div class="main-container">
        <div class="form-header">
            <a href="./bourses.html"><h1>CANDIDATURE AUX BOURSES</h1></a>
            <a href="./bourses.html"><p>Ministère de l'Éducation Nationale et de l'Alphabétisation</p></a>
        </div>

        <form action="#" method="POST" enctype="multipart/form-data">
            
            <fieldset>
                <legend>Identification du Candidat</legend>
                <div class="row">
                    <div class="input-group">
                        <label>Nom de famille</label>
                        <input type="text" name="nom" placeholder="Ex: Bakayoko" required>
                    </div>
                    <div class="input-group">
                        <label>Prénoms</label>
                        <input type="text" name="prenoms" placeholder="Ex: Cheick" required>
                    </div>
                </div>
                <div class="row">
                    <div class="input-group">
                        <label>Date de naissance</label>
                        <input type="date" name="date_naissance" required>
                    </div>
                    <div class="input-group">
                        <label>Lieu de naissance</label>
                        <input type="text" name="lieu_naissance" placeholder="Ex: Yamoussoukro" required>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Coordonnées de Contact</legend>
                <div class="row">
                    <div class="input-group">
                        <label>Téléphone (WhatsApp)</label>
                        <input type="tel" name="tel" placeholder="+225 07..." required>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="candidat@domaine.ci" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Lieu de résidence actuel</label>
                    <input type="text" name="residence" placeholder="Commune, Quartier (ex: Marcory, Remblais)">
                </div>
            </fieldset>

            <fieldset>
                <legend>Dossier Académique</legend>
                <div class="row">
                    <div class="input-group">
                        <label>Série du BAC / Diplôme</label>
                        <input type="text" name="serie" placeholder="Ex: Série C">
                    </div>
                    <div class="input-group">
                        <label>Moyenne obtenue</label>
                        <input type="number" step="0.01" name="moyenne" placeholder="Ex: 15.20">
                    </div>
                </div>
                <div class="input-group">
                    <label>Scanner du diplôme ou relevé (PDF)</label>
                    <input type="file" name="document" accept=".pdf,.jpg">
                </div>
            </fieldset>

            <button type="submit" class="submit-button">ENVOYER MA DEMANDE</button>
            
            <div class="form-footer">
                <small>République de Côte d'Ivoire | Union - Discipline - Travail</small>
            </div>
        </form>
    </div>
</body>
</html>

      <div class="akwaba-form-container">
    <div class="akwaba-form-card">
        <div class="akwaba-form-header">
            <h2>Espace Préoccupation</h2>
            <p>Votre voix compte pour Gbao.CI</p>
        </div>

        <form action="#" method="POST" class="akwaba-main-form">
            <div class="akwaba-input-group">
                <label for="nom">Nom</label>
                <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
            </div>

            <div class="akwaba-input-group">
                <label for="prenom">Prénom</label>
                <input type="text" id="prenom" name="prenom" placeholder="Votre prénom" required>
            </div>

            <div class="akwaba-input-group">
                <label for="contact">Contact (Téléphone)</label>
                <input type="tel" id="contact" name="contact" placeholder="+225 00 00 00 00 00" required>
            </div>

            <div class="akwaba-input-group">
                <label for="message">Votre Préoccupation</label>
                <textarea id="message" name="message" rows="4" placeholder="Expliquez-nous votre besoin..." required></textarea>
            </div>

            <button type="submit" class="akwaba-submit-btn">
                Envoyer ma demande
            </button>
        </form>
    </div>
</div>
